    function handleSearch() {
        const input = document.getElementById('searchBox');
        if (!input) return; 
        const val = input.value; 
        const trimVal = val.trim();
        const app = document.getElementById('mainApp');
        const ghost = document.getElementById('searchGhost');
        const clearBtn = document.getElementById('clearBtn');
        if(clearBtn) clearBtn.style.display = (trimVal || currentCategory !== 'all') ? 'flex' : 'none';
        
        let foundSuggestion = false;
        if (val && val === val.trimStart()) {
            const tokens = val.toLowerCase().split(/\s+/);
            const lastToken = tokens[tokens.length - 1];
            const normLast = lastToken.replace(/[^a-z0-9]/g, '');
            if (normLast.length >= 1) {
                const match = window.dictArray.find(w => w.startsWith(normLast));
                if (match) {
                    const suggestionSuffix = match.substring(normLast.length);
                    const safeVal = val.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    ghost.innerHTML = `<span style="visibility:hidden;">${safeVal}</span>${suggestionSuffix}`;
                    ghost.dataset.suggestion = val + suggestionSuffix;
                    foundSuggestion = true;
                }
            }
        }
        if (!foundSuggestion) {
            ghost.innerHTML = ""; ghost.dataset.suggestion = "";
        }

        if(!trimVal && currentCategory === 'all') { 
            if(ghost) ghost.innerHTML = "";
            if(app) app.classList.remove('searching'); return; 
        }
        if(app) app.classList.add('searching');
        executeHeavySearch(trimVal, normalizeStr(trimVal), document.getElementById('resultCount'), currentCategory);
    }

    function executeHeavySearch(originalVal, normVal, counter, catFilter) {
        const t = i18n[curLang] || i18n['nl']; 
        const list = document.getElementById('resultsList');
        if (!list) return;
        
        const tokens = normVal.split(/\s+/).filter(w => w.length > 0);
        let results = data.filter(item => {
            if (catFilter !== 'all' && getHg(item) !== catFilter) return false;
            return tokens.every(tok => item._searchStr.includes(tok));
        });
        
        if (results.length === 0 && tokens.length > 0) {
            results = data.filter(item => {
                if (catFilter !== 'all' && getHg(item) !== catFilter) return false;
                return tokens.every(tok => {
                    if (item._searchStr.includes(tok)) return true;
                    if (tok.length <= 2) return false; 
                    return item._nameWords.some(w => {
                        if (w.length <= 2 || Math.abs(w.length - tok.length) > 2) return false;
                        return levenshteinDistance(tok, w) <= 1; 
                    });
                });
            });
        }
        
        if (counter) {
            counter.innerText = `${results.length} ${results.length === 1 ? t.resFoundSingular : t.resFoundPlural}`;
        }
        
        if (results.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding: 40px; font-weight: bold; color: var(--text-muted);">${t.noResTitle} "${originalVal.replace(/</g, "&lt;")}"</div>`;
            return;
        }

        const rawTokens = originalVal.split(/\s+/).filter(w => w.length > 0);
        const highlightText = (text) => {
            if (!text) return '';
            let str = String(text);
            if (rawTokens.length === 0) return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            const validTokens = rawTokens.filter(t => t.trim().length > 0).sort((a,b) => b.length - a.length);
            if (validTokens.length === 0) return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            const escapedTokens = validTokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
            const regex = new RegExp(`(${escapedTokens.join('|')})`, 'gi');
            
            str = str.replace(regex, '\u0001$1\u0002');
            str = str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            str = str.replace(/\u0001/g, '<mark>').replace(/\u0002/g, '</mark>');
            return str;
        };

        list.innerHTML = results.map(item => {
            const loc2 = getLoc(item);
            const loc2Up = loc2.toUpperCase();
            
            let pad = '0AW';
            let padDisplay = '0AW';
            let subTarget = '';
            
            if (loc2Up.includes('PAD KA') || loc2Up.includes('KAS')) { 
                pad = 'KAS'; padDisplay = 'KAS'; 
                const omsch = getOmsch(item).toUpperCase();
                if (loc2Up.includes('SERVICE')) subTarget = 'service';
                else if (loc2Up.includes('VERKOOP') || omsch.includes('KEUKEN')) subTarget = 'sales1';
                else subTarget = 'kassa';
            }
            else if (loc2Up.includes('PAD VM') || loc2Up.includes('VMB')) { pad = '9'; padDisplay = 'VM'; subTarget = 'paint'; }
            else if (loc2Up.includes('PAD LI') || loc2Up.includes('LIJ')) { pad = '2'; padDisplay = 'LI'; }
            else if (loc2Up.includes('PAD BA') || loc2Up.includes('BAL')) { pad = 'KAS'; padDisplay = 'BA'; subTarget = 'service'; }
            else if (loc2Up.includes('PAD PB') || loc2Up.includes('PBM')) { pad = '13'; padDisplay = 'PB'; }
            else if (loc2Up.includes('KOFFIE')) { pad = 'KOFFIE'; padDisplay = 'KOF'; subTarget = 'coffee'; }
            else if (loc2Up.includes('ZAAG')) { pad = 'SAW'; padDisplay = 'ZAAG'; subTarget = 'sawmill'; }
            else if (loc2Up.includes('0A') || loc2Up.includes('AW')) { pad = '0AW'; padDisplay = '0A'; }
            else {
                const padMatch = loc2.match(/Pad\s*0*(\d+)/i);
                if (padMatch) {
                    pad = parseInt(padMatch[1], 10).toString();
                    padDisplay = pad;
                } else {
                    const codeMatchPad = loc2.match(/^0*(\d+)[LR]-/i);
                    if (codeMatchPad) {
                        pad = parseInt(codeMatchPad[1], 10).toString();
                        padDisplay = pad;
                    } else {
                        const fallbackMatch = loc2.match(/0*(\d+)/);
                        if (fallbackMatch && parseInt(fallbackMatch[1], 10) <= 17) {
                            pad = parseInt(fallbackMatch[1], 10).toString();
                            padDisplay = pad;
                        }
                    }
                }
            }

            let sec = '1';
            const secMatch = loc2.match(/Sectie\s*0*(\d+)/i);
            if (secMatch) {
                sec = parseInt(secMatch[1], 10).toString();
            } else {
                const codeMatchSec = loc2.match(/^[A-Z0-9]+[LR]?-0*(\d+)-/i);
                if (codeMatchSec) {
                    sec = parseInt(codeMatchSec[1], 10).toString();
                }
            }

            let sideRaw = 'Links';
            if (loc2.includes('Rechts') || loc2.match(/^[A-Z0-9]+R-/i)) {
                sideRaw = 'Rechts';
            } else if (loc2.includes('Links') || loc2.match(/^[A-Z0-9]+L-/i)) {
                sideRaw = 'Links';
            }
            
            let useStandardBadge = /pad.*sectie/i.test(loc2) || /^[0-9]+$/.test(padDisplay) || ['0A', 'BA', 'PB', 'VM', 'LI'].includes(padDisplay);

            let displayLocString = loc2;
            if (!/pad/i.test(displayLocString) && useStandardBadge) {
                displayLocString = t.padWord + " " + displayLocString;
            } else if (!/locatie/i.test(displayLocString) && !/pad/i.test(displayLocString) && !useStandardBadge) {
                displayLocString = t.location + " " + displayLocString;
            }

            const hgStr = getHg(item);
            const sgStr = getSg(item);
            const artNrClean = getArtNr(item).trim();
            const catIcon = icons[hgStr] || '📦';
            const imgHtml = `<img src="img/${artNrClean}.webp" onerror="handleImgFallback(this, '${artNrClean}', '${catIcon}')" alt="Product">`;
            
            const safeArtNrHighlight = highlightText(getArtNr(item));
            const safeOmschHighlight = highlightText(getOmsch(item));
            
            let badgeHtml = '';
            if (!useStandardBadge) {
                badgeHtml = `
                <div class="badge" style="background: var(--primary-dark);">
                    <span>${t.loc}</span>
                    <b style="font-size: 1.1rem; word-break: break-all;">${padDisplay}</b>
                </div>`;
            } else {
                badgeHtml = `
                <div class="badge">
                    <span>${t.pad.toUpperCase()}</span>
                    <b>${padDisplay}</b>
                    <div class="sectie-label-badge">${(sideRaw === 'Rechts' ? t.right : t.left).toUpperCase()}<br>${t.sect} ${sec}</div>
                </div>`;
            }
            
            const transHg = (t.groups && t.groups[hgStr]) ? t.groups[hgStr] : hgStr;
            const transSg = (t.groups && t.groups[sgStr]) ? t.groups[sgStr] : sgStr;
            
            const hgHighlight = highlightText(transHg);
            const sgHighlight = transSg ? highlightText(transSg) : '';
            
            const safeArtNr = String(artNrClean).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            const safePad = String(pad).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            const safeSec = String(sec).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            const safeSideRaw = String(sideRaw).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            const safeSubTarget = String(subTarget).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            
            return `<div class="result-item" onclick="selectItem('${safePad}', '${safeSec}', '${safeSideRaw}', this, '${safeSubTarget}', '${safeArtNr}')">
                <div class="icon-wrap">${imgHtml}</div>
                <div class="info">
                    <h3>${safeOmschHighlight}</h3>
                    <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 800; margin-bottom: 4px;">${t.art} ${safeArtNrHighlight}</div>
                    <div class="tags">
                        <span class="tag">${hgHighlight}</span>
                        ${sgHighlight ? `<span class="tag sub">${sgHighlight}</span>` : ''}
                    </div>
                </div>
                ${badgeHtml}
            </div>`;
        }).join('');
    }

    window.showAisleExplorer = function(pad, e) {
        if (e) e.stopPropagation();
        
        const card = document.getElementById('aisleExplorerCard');
        if (!card) return;
        
        const t = i18n[curLang] || i18n['nl'];
        let padStr = String(pad);
        
        let aisleProducts = [];
        data.forEach(item => {
            const loc2 = getLoc(item).toUpperCase();
            let itemPad = '';
            const match = loc2.match(/PAD\s*0*(\d+)/i) || loc2.match(/^0*(\d+)[LR]-/i);
            if (match) itemPad = parseInt(match[1], 10).toString();
            else if (loc2.includes('1L')) itemPad = '1L';
            else if (loc2.includes('0AW') || loc2.includes('0A')) itemPad = '0AW';
            
            if (itemPad === padStr) {
                aisleProducts.push(item);
            }
        });
        
        // Sort products alphabetically and cap at a reasonable number for performance
        aisleProducts.sort((a, b) => getOmsch(a).localeCompare(getOmsch(b)));
        const displayProducts = aisleProducts.slice(0, 15);
        
        let listHtml = '';
        if (displayProducts.length > 0) {
            listHtml = displayProducts.map(item => {
                const name = getOmsch(item);
                const artNr = getArtNr(item);
                const cleanArt = artNr.toString().trim().replace(/[-\s]/g, '').toLowerCase();
                const hg = getHg(item);
                const catIcon = icons[hg] || '📦';
                
                const safeName = name.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const jsSafeArt = artNr.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
                
                let sec = '1';
                const loc2 = getLoc(item);
                const secMatch = loc2.match(/Sectie\s*0*(\d+)/i) || loc2.match(/^[A-Z0-9]+[LR]?-0*(\d+)-/i);
                if (secMatch) sec = parseInt(secMatch[1], 10).toString();
                
                let sideRaw = 'Links';
                if (loc2.includes('Rechts') || loc2.match(/^[A-Z0-9]+R-/i)) sideRaw = 'Rechts';

                const safeSec = String(sec).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
                const safeSideRaw = String(sideRaw).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
                
                return `
                <li class="ae-item" onclick="event.stopPropagation(); selectItem('${padStr}', '${safeSec}', '${safeSideRaw}', null, '', '${jsSafeArt}'); document.getElementById('aisleExplorerCard').classList.remove('show');">
                    <div class="ae-icon">
                        <img src="img/${cleanArt}.webp" onerror="handleImgFallback(this, '${cleanArt}', '${catIcon}')" alt="">
                    </div>
                    <div class="ae-item-info">
                        <div class="ae-item-title" title="${safeName}">${safeName}</div>
                        <div class="ae-item-art">${t.art} ${artNr}</div>
                    </div>
                </li>`;
            }).join('');
        } else {
            listHtml = `<li class="ae-item" style="justify-content:center; color:var(--text-muted); font-size:0.8rem; cursor:default; pointer-events:none;">Geen specifieke producten gevonden</li>`;
        }
        
        let padDisplay = padStr;
        if (padStr === '0AW') padDisplay = t.backWallShort || 'Achterwand';
        else if (padStr === '1L') padDisplay = `1 ${t.leftWord || 'Links'}`;
        else padDisplay = `${t.padWord || 'Pad'} ${padStr}`;
        
        const safePadName = padDisplay.replace(/'/g, "\\'");
        
        card.innerHTML = `
            <div class="ae-header">
                <span>📍 ${padDisplay}</span>
                <button class="ae-close" onclick="event.stopPropagation(); document.getElementById('aisleExplorerCard').classList.remove('show')">✕</button>
            </div>
            <ul class="ae-list">
                ${listHtml}
            </ul>
        `;
        
        const prodCard = document.getElementById('productDetailCard');
        if (prodCard) prodCard.classList.remove('show');

        card.classList.add('show');
    };

    // --- SHOPPING LIST & ROUTES LOGIC ---
    window.toggleCartPanel = function() {
        document.getElementById('cartPanel').classList.toggle('show');
    };

    window.addToCart = function(artNr, e) {
        e.stopPropagation(); 
        const isAdded = shoppingList.find(i => String(getArtNr(i)) === String(artNr));
        if (isAdded) {
            window.removeFromCart(artNr, e);
            return;
        }
        const item = data.find(d => String(getArtNr(d)) === String(artNr));
        if (!item) return;
        
        shoppingList.push(item);
        const btn = document.getElementById('btn-add-' + artNr);
        if (btn) btn.classList.add('added');
        updateCartUI();
    };

    window.removeFromCart = function(artNr, e) {
        if(e) e.stopPropagation();
        shoppingList = shoppingList.filter(i => String(getArtNr(i)) !== String(artNr));
        const btn = document.getElementById('btn-add-' + artNr);
        if (btn) btn.classList.remove('added');
        updateCartUI();
    };

    function updateCartUI() {
        const badge = document.getElementById('cartBadge');
        const fab = document.getElementById('fabCart');
        const list = document.getElementById('cartItemsList');
        const t = i18n[curLang] || i18n['nl'];
        
        if (shoppingList.length > 0) {
            badge.innerText = shoppingList.length;
            fab.classList.remove('hidden');
        } else {
            fab.classList.add('hidden');
            document.getElementById('cartPanel').classList.remove('show');
            closeVisualSelection();
        }
        
        if (shoppingList.length === 0) {
            list.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-muted); font-weight: bold;">${t.emptyList}</div>`;
            return;
        }
        
        list.innerHTML = shoppingList.map(item => {
            const artNr = getArtNr(item);
            const name = getOmsch(item).replace(/</g, "&lt;");
            let loc = getLoc(item);
            if (loc) {
                loc = loc.replace(/Pad/ig, t.padWord).replace(/Sectie/ig, t.sect).replace(/Links/ig, t.leftWord).replace(/Rechts/ig, t.rightWord);
            }
            return `
            <div class="cart-item">
                <div class="cart-item-info">
                    <h4 class="cart-item-title">${name}</h4>
                    <div class="cart-item-loc">📍 ${loc || t.unknownLoc}</div>
                </div>
                <button class="cart-item-remove" onclick="window.removeFromCart('${artNr}', event)">✕</button>
            </div>`;
        }).join('');
    }

    window.calculateMultiRoute = function() {
        if(shoppingList.length === 0) return;
        document.getElementById('cartPanel').classList.remove('show');
        
        const mapWrapNode = document.getElementById('mapWrapper');
        if (mapWrapNode && !mapWrapNode.classList.contains('map-expanded-overlay')) {
            toggleMapExpand(true);
        }
        
        setTimeout(() => {
            closeVisualSelection();
            const grid = document.getElementById('mapGrid'), path = document.getElementById('guideLine'), char = document.getElementById('mainChar');
            if(!grid || !path || !char) return;

            let stops = shoppingList.map(item => {
                const loc2 = getLoc(item).toUpperCase();
                let pad = '0AW', sec = '1';
                
                if (loc2.includes('PAD KA') || loc2.includes('KAS')) pad = 'KAS';
                else if (loc2.includes('PAD VM') || loc2.includes('VMB')) pad = '9';
                else if (loc2.includes('PAD LI') || loc2.includes('LIJ')) pad = '2';
                else if (loc2.includes('PAD BA') || loc2.includes('BAL')) pad = 'KAS';
                else if (loc2.includes('PAD PB') || loc2.includes('PBM')) pad = '13';
                else if (loc2.includes('KOFFIE')) pad = 'KOFFIE';
                else if (loc2.includes('ZAAG')) pad = 'SAW';
                else if (loc2.includes('0A') || loc2.includes('AW')) pad = '0AW';
                else {
                    const pm = loc2.match(/PAD\s*0*(\d+)/i) || loc2.match(/^0*(\d+)[LR]-/i) || loc2.match(/0*(\d+)/);
                    if (pm && parseInt(pm[1])<=17) pad = parseInt(pm[1]).toString();
                }
                
                const sm = loc2.match(/SECTIE\s*0*(\d+)/i) || loc2.match(/^[A-Z0-9]+[LR]?-0*(\d+)-/i);
                if (sm) sec = parseInt(sm[1]).toString();
                
                let isL = loc2.includes('LINKS') || loc2.match(/^[A-Z0-9]+L-/i);
                
                let order = 99;
                if(pad === '1L') order = 0;
                else if (!isNaN(pad)) order = parseInt(pad);
                else if (pad === '0AW') order = 20;
                else if (pad === 'SAW') order = 21;
                else if (pad === 'KOFFIE') order = 22;
                else if (pad === 'KAS') order = 23;
                else if (pad === 'UITGANG') order = 24;
                
                return { item, pad, sec, isL, order };
            });

            stops.sort((a,b) => a.order - b.order);

            const fh = grid.offsetHeight, sPos = window.kioskPosX ? window.kioskPosX - 12 : 323, sY = fh - 6, mY = fh - (8/100*fh);
            let pathStr = `M ${sPos},${sY} L ${sPos},${mY}`;
            
            stops.forEach(stop => {
                let { pad, sec, isL } = stop;
                let cx = sPos, targetB = '0%';
                
                if (pad === '0AW') {
                    cx = 40 + ((parseInt(sec)-1)/16)*(grid.offsetWidth-80);
                    targetB = '90%';
                }
                else if (pad === 'KAS') { const kE = document.getElementById('cashierZone'); cx = kE ? kE.offsetLeft - 8 : 400; targetB = '1%'; }
                else if (pad === 'SAW') { const sE = document.getElementById('sawmillZone'); cx = sE ? sE.offsetLeft - 8 : 600; targetB = '1%'; }
                else if (pad === 'KOFFIE') { const cE = document.getElementById('coffeeCorner'); cx = cE ? cE.offsetLeft - 8 : 800; targetB = '1%'; }
                else if (!isNaN(pad) || pad === '1L') {
                    const rP = isL ? (pad === '1' ? '1L' : (parseInt(pad)-1).toString()) : pad.toString();
                    const tEl = document.getElementById(`p-${rP}`);
                    if(tEl) {
                        const gap = 12;
                        cx = isL ? tEl.offsetLeft + tEl.offsetWidth + gap : tEl.offsetLeft - gap;
                        const s = parseInt(sec);
                        targetB = (pad === '1L' || pad === '17') ? (10+((s-1)/16)*75)+'%' : (s<=6 ? (10+((s-1)/5)*25)+'%' : (55+((s-7)/10)*30)+'%');
                    }
                }
                
                const eY = fh - (parseFloat(targetB)/100*fh);
                pathStr += ` L ${cx},${mY} L ${cx},${eY} L ${cx},${mY}`;

                // Highlight rack visually
                if (pad === '0AW') {
                    const bw = document.getElementById('p-0AW');
                    if(bw) {
                        bw.classList.add('active');
                        bw.querySelectorAll('.sec-container span').forEach(sp => {
                            if (sp.dataset.sec === sec.toString()) sp.classList.add('highlighted-sec');
                        });
                    }
                }
                else if (['KAS', 'KOFFIE', 'SAW'].includes(pad)) {
                    document.getElementById(pad === 'KAS' ? 'cashierZone' : (pad === 'KOFFIE' ? 'coffeeCorner' : 'sawmillZone'))?.classList.add('active');
                }
                else {
                    const rP = isL ? (pad === '1' ? '1L' : (parseInt(pad)-1).toString()) : pad.toString();
                    const rEl = document.getElementById(`p-${rP}`);
                    if (rEl) {
                        rEl.classList.add('active', isL ? 'active-side-right' : 'active-side-left');
                        document.getElementById(`p-${pad}`)?.classList.add('active-num');
                        rEl.querySelectorAll('.aisle-part').forEach(p => p.classList.add('active-part'));
                        rEl.querySelectorAll('.sec-container span').forEach(sp => {
                            if (!sp.dataset.origText) sp.dataset.origText = sp.innerText;
                            if (sp.dataset.origText === sec.toString()) sp.classList.add('highlighted-sec');
                        });
                    }
                }
            });

            // End at Exit
            const extEl = document.getElementById('exitDoor'), exX = extEl ? extEl.offsetLeft : 700;
            pathStr += ` L ${exX},${mY} L ${exX},${sY}`;

            const np = path.cloneNode(true);
            np.setAttribute('d', pathStr);
            np.style.strokeDasharray = "10 15";
            np.classList.add('multi-route-path');
            path.parentNode.replaceChild(np, path);

            char.style.left = `${exX}px`; char.style.bottom = `6px`; char.classList.remove('running', 'interacting');
        }, 300);
    };

</script>
